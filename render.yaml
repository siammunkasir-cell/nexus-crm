services:
  # API Backend
  - type: web
    name: nexus-crm-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd apps/api && npm install && npm install -g pnpm && pnpm install && npx prisma generate
    startCommand: cd apps/api && npx prisma db push && npx tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        value: nexus-jwt-secret-prod-2026
      - key: JWT_REFRESH_SECRET
        value: nexus-refresh-secret-prod-2026
      - key: CORS_ORIGIN
        value: https://nexus-crm-web.onrender.com
      - key: DEEPSEEK_API_KEY
        sync: false

  # Web Frontend
  - type: web
    name: nexus-crm-web
    env: node
    region: oregon
    plan: free
    buildCommand: cd apps/web && npm install && npm install -g pnpm && pnpm install && npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_URL
        value: https://nexus-crm-api.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://nexus-crm-web.onrender.com
